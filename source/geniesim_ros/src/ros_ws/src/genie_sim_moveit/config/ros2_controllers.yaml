chassis_controller:
  ros__parameters:
    joint_name: planar_joint
    cmd_twist_topic: /cmd_twist
    odom_topic: /odom
    use_odom_state: true
    odom_timeout: 0.5
    map_frame: map
    base_frame: base_link
    # PD gains for the world-frame regulator. kp pulls toward the setpoint;
    # kd damps measured velocity (read from /odom) so the base does not
    # carry residual momentum past the trajectory end -> overshoot.
    kp_xy: 2.0
    kp_yaw: 3.0
    kd_xy: 0.5
    kd_yaw: 0.6
    # Decel-window: when |pos_err| is inside this radius of the live setpoint,
    # the commanded twist magnitude is tapered linearly to zero. Prevents the
    # P term from saturating the chassis right up to the goal, which is the
    # root cause of overshoot in a feedforward+P scheme. Set to 0 to disable.
    decel_window_xy: 0.15      # meters
    decel_window_yaw: 0.20     # radians
    # Saturation must match joint_limits.yaml -> planar_joint/{trans_x,trans_y,rot_z}
    # (the active sub-DoFs of the floating virtual_joint; trans_z, rot_x, rot_y
    # are pinned -- see genie.srdf comment).  If they disagree, MoveIt plans a profile the executor cannot follow
    # and the base trails the RViz preview by `(planned - executable) * t`.
    max_linear_speed: 0.5
    max_angular_speed: 1.0
    # Goal tolerances were 0.05 each; with the new PD law the regulator
    # actually settles cleanly inside 2 cm / ~1.4 deg, so we tighten them
    # to make "did the base stop where I dragged the marker" obvious.
    goal_tolerance_xy: 0.02
    goal_tolerance_yaw: 0.025
    goal_time_tolerance: 2.0
    # Stop-band: forces an exact zero twist when both position error and
    # measured velocity are below these thresholds (only past trajectory end).
    # Avoids streaming sub-cm twitches to the wheel servos near the goal.
    stop_band_v: 0.02          # m/s
    stop_band_w: 0.05          # rad/s
