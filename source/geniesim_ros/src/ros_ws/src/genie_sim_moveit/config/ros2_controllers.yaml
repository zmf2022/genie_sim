chassis_servo_controller:
  ros__parameters:
    control_rate: 100.0
    wheel_distance: 0.44
    axis_distance: 0.46
    wheel_radius: 0.07
    max_steer_angle: 1.5708
    max_steer_speed: 12.0
    max_drive_speed: 1.0
    max_drive_accel: 20.0

    init_wait_time_ms: 1000.0
    set_cmd_timeout_ms: 5000.0
    twist_timeout_ms: 1000.0
    state_timeout_ms: 1000.0
    check_state_cmd_diff: false
    max_steer_state_cmd_diff: 0.1

    use_steer_ltd: false
    steer_ltd_r: 30.0
    use_drive_ltd: false
    drive_ltd_r: 30.0

    default_servo: "OptimalServo"

    steer_joint_names:
      - idx111_chassis_lwheel_front_joint1
      - idx131_chassis_rwheel_front_joint1
      - idx121_chassis_lwheel_rear_joint1
      - idx141_chassis_rwheel_rear_joint1
    drive_joint_names:
      - idx112_chassis_lwheel_front_joint2
      - idx132_chassis_rwheel_front_joint2
      - idx122_chassis_lwheel_rear_joint2
      - idx142_chassis_rwheel_rear_joint2
