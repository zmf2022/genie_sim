# genie_sim_engine physics tuning parameters.
#
# Scope: this file is consumed by both engines:
#
#   * Isaac Sim path (``physics_engine=isaac_physx`` /
#     ``physics_engine=isaac_newton``) — ``kit/stage.py:
#     _configure_drives`` writes Layer 1 to USD ``DriveAPI`` prims,
#     ``_init_articulation`` writes Layer 2 via the Isaac tensor
#     ``ArticulationView.set_dof_stiffnesses``.
#   * Newton-standalone path (``physics_engine=newton``) —
#     ``engine/newton/adapters/mujoco_warp.py:MuJoCoWarpAdapter
#     .prepare_model`` classifies each DOF via
#     ``common.joint_classification`` and pulls per-class kp / kd /
#     max_effort from Layer 2 (body / arm / head / chassis_drive /
#     chassis_steer) plus the gripper master from Layer 1.  Brings
#     newton-standalone into runtime parity with the wrapper, since
#     the wrapper's runtime gains all live in Layer 2.
#
# Historical note: this file was named ``params.yaml`` originally,
# briefly renamed to ``isaac_params.yaml`` while only the Isaac path
# read it, then renamed to ``physics_params.yaml`` once the newton-
# standalone wiring closed that gap.  Both engines now consume it.
#
# Loaded by ``EngineSession`` at startup via the ``physics_params_file``
# ROS parameter (defaults to ``share/genie_sim_engine/config/
# physics_params.yaml`` when unset).  Missing keys fall back to the
# built-in defaults defined in ``common/params.py``.  Unknown joint
# names are a HARD ERROR — the adapter exits at startup rather than
# silently leaving the offending joint at the URDF importer's
# vestigial defaults.  Add a regex to ``common/joint_classification
# .py`` if a new robot family needs its joints classified.
#
# All stiffness / damping / max_force values are in PhysX units
# (effectively N/rad and N*s/rad for revolute joints, N/m and N*s/m
# for prismatic).
#
# Two-layer drive authoring
# -------------------------
# A joint in Isaac Sim has TWO independent PD layers, and this file
# controls both.  They write to DIFFERENT APIs and have DIFFERENT
# consumers.  Renaming the blocks from the legacy ``drive:`` /
# ``articulation:`` (which read as a single concept) to make the
# distinction unmissable:
#
#   usd_drive_api:                ← Layer 1 (USD-authored)
#     Writes to ``UsdPhysics.DriveAPI`` attributes on each joint prim
#     in ``robot.usda`` at assemble / launch time
#     (``kit/stage.py:_configure_drives``, before ``world.reset()``).
#     The values STICK to the USD asset and are picked up by ANY
#     consumer that parses the stage:
#       * PhysX's USD parser → articulation initial gains
#       * Newton's ``add_usd`` → ``model.joint_target_ke`` /
#         ``joint_target_kd`` → ``actuator gainprm/biasprm`` in the
#         dumped MJCF (newton-standalone) or the live mjwarp
#         (isaac_newton wrapper)
#     Persistent.  Cross-engine.  Also the only place to author
#     USD-schema features that have no ArticulationView analogue:
#     joint limits, ``physxJoint:armature``,
#     ``PhysxMimicJointAPI:angular:naturalFrequency`` etc.
#
#   articulation_view_runtime:    ← Layer 2 (runtime tensor override)
#     Writes via Isaac's ``ArticulationView.set_dof_stiffnesses`` /
#     ``set_dof_dampings`` / ``set_dof_max_forces`` after
#     ``world.reset()`` (``kit/stage.py:_init_articulation``).  Reaches
#     PhysX directly (it owns the articulation handle) AND reaches
#     Newton mjwarp on the isaac_newton wrapper path because the Isaac
#     tensor view's setter calls ``_notify_joint_dof_properties_changed``
#     which mutates ``model.joint_target_ke`` and the live
#     ``mjw_model.actuator_gainprm``.
#     Run-only.  Wins over Layer 1 when an ``ArticulationRootAPI`` is
#     present (i.e. always, for our robots).
#     Invisible to newton-standalone: that path never instantiates an
#     Isaac ``ArticulationView``, so these values don't reach it.
#     Tune newton-standalone via the launcher's ``mujoco_pd_ke`` /
#     ``mujoco_pd_kd`` or by re-baking the USD overlay in
#     ``assemble_robot.py``.
#
# Why have both blocks?
# - Layer 1 is the SEED that runs in the brief window between USD load
#   and ``_init_articulation``.  It also reaches engines that don't run
#   the Isaac tensor API (newton-standalone).
# - Layer 2 is the runtime AUTHORITY for Isaac tensor paths.
# - Most classes use matching values in both layers (no surprise on
#   handover).  The chassis_drive intentionally diverges: Layer 1
#   damping=1e6 is a safe-fallback seed (so wheels can't oscillate
#   pre-init), Layer 2 kd=1e4 is the actual runtime target.

# Layer 1 — per-joint UsdPhysics.DriveAPI authored to USD.
# (Was named ``drive:`` historically; renamed to make the API and
# scope explicit.  See top-of-file block comment.)
usd_drive_api:
  chassis_drive_joint:        # chassis_*wheel*joint* with very wide limits — free-spin road wheel
    free_limits: true         # set lower/upper limits to +/- 1e20
    stiffness: 0.0
    damping: 1.0e6            # safe-fallback seed (Layer 2's kd=1e4 wins at runtime)
    max_force: 1.0e7
    # Drive-wheel exception to the x2 uniform baseline:
    # ``dof_frictionloss=0`` instead of the uniform 0.3.  A free-rolling
    # road wheel should NOT have a static-friction floor — at fl=0.3,
    # the wheel can't START rolling until commanded torque > 0.3 N·m,
    # which gives a velocity-dead-band of ~0.03 rad/s and produces
    # stick-slip under contact.  Reference G2 wheels also use 0 here.
    # Viscous braking still comes from the velocity actuator kd=10
    # (see ``articulation_view_runtime.chassis_drive``).
    dof_damping: 0.0
    dof_frictionloss: 0.05
    # ``armature: 0`` is intentional on the road wheel — adding rotor
    # inertia here makes the chassis feel sticky / inertial under
    # navigation commands (heavy flywheel on each wheel).  Free-roll
    # behaviour requires zero here.
    armature: 0.0
  chassis_steer_joint:        # chassis_*wheel*joint* with normal limits — stiffer/faster than body so the rack tracks fast & accurate
    stiffness: 1.0e5
    damping: 5.0e3
    max_force: 5.0e3
    dof_damping: 0.0
    dof_frictionloss: 0.3
    armature: 0.05
  default_revolute:           # body / arm / head revolute joints
    stiffness: 5.0e4
    damping: 5.0e3
    max_force: 5.0e3
    # Passive joint physics (independent of the actuator's PD above).
    # Authored on USD as ``mjc:damping`` / ``mjc:frictionloss`` and
    # land as MuJoCo ``dof_damping`` / ``dof_frictionloss``.
    #
    # Strategy (x2_31dof_hand convention): uniform
    # ``armature=0.03 / frictionloss=0.3 / damping=0`` across every
    # joint.  Pure-torque mental model — actuator's PD provides the
    # restoring force, joint adds a constant Coulomb-like friction
    # floor (``frictionloss``) for numerical robustness, and a tiny
    # rotor inertia (``armature``) for kp/dt² stability headroom.
    # No viscous damping = no implicit-velocity-feedback dependency,
    # simpler tuning, behaviour matches RL/WBC-friendly references.
    #
    # Reference G2 MJCF uses tiered damping (shoulder 3.0, mid 1.5, wrist 0.8) and tiered
    # frictionloss — that's the alternative "in-sim PD damps itself"
    # path.  We picked x2's simpler uniform approach instead so all
    # arm/body/head/chassis/gripper joints carry the SAME passive
    # tuning, and the PD layer ALONE is what we tune per class.
    dof_damping: 0.0
    dof_frictionloss: 0.3
    # Fallback armature for joints that classify into the generic
    # ``JK_ARM`` bucket (didn't match shoulder/mid/wrist regexes).
    # 0.05 = midpoint of the per-tier values below.
    armature: 0.05
  # Per-sub-class passive-joint overrides.  Only the ``dof_*`` fields
  # are read by the mjwarp adapter on these blocks (the
  # ``stiffness``/``damping``/``max_force`` actuator gains live in
  # ``articulation_view_runtime`` for the runtime PD path).  Each
  # block now carries the SAME uniform values — the sub-class blocks
  # are kept (instead of collapsed into ``default_revolute``) so a
  # later operator can re-tier them per-joint without re-introducing
  # the block structure.  Omit any field and it falls back to the
  # matching field on ``default_revolute``.
  body:                       # body_joint1..5 — torso chain
    dof_damping: 0.0
    dof_frictionloss: 0.3
    # Per-class armature: torso links are heavy (7-20 kg) so 0.1 of
    # rotor inertia is < 1% of M_eff — invisible to tracking but adds
    # solver-conditioning headroom and damps the kp=1e5 / dt² term.
    armature: 0.1
  head:                       # head_joint1..3 — neck chain
    dof_damping: 0.0
    dof_frictionloss: 0.3
    # Head joints span a wide inertia range (link3 is ~18 kg, links
    # 1-2 are ~0.1 kg).  0.05 keeps the light-link tracking penalty
    # small while still giving the heavier link enough damping.
    armature: 0.05
  arm_shoulder:               # arm_*_joint1, joint2 — proximal / heavy
    dof_damping: 0.0
    dof_frictionloss: 0.3
    armature: 0.05
  arm_mid:                    # arm_*_joint3, 4, 5 — elbow region
    dof_damping: 0.0
    dof_frictionloss: 0.3
    armature: 0.05
  arm_wrist:                  # arm_*_joint6, joint7 — distal / light
    dof_damping: 0.0
    dof_frictionloss: 0.3
    # Wrist links are ≈ 0.3-0.8 kg — armature=0.1 here would inflate
    # effective inertia by 30-100% and visibly slow tracking.  0.02
    # is the smallest value that still gives meaningful stick-slip
    # smoothing across the 1 ms substep.
    armature: 0.02
  default_prismatic:          # any prismatic joint
    stiffness: 5.0e4
    damping: 5.0e3
    max_force: 5.0e4
  gripper:                    # URDF-route Robotiq-style grippers (one master + N mimics)
    # Applied ONLY when the robot was built from a URDF (assemble_robot.py).
    # Legacy hand-authored USDs are left alone so their hand-tuning survives.
    # The master joint is identified purely by `HasAPI(DriveAPI)` — it is
    # the only drive-carrying joint in a Robotiq-style topology, so this
    # works for 2F-85, 2F-140, and any other gripper that follows the same
    # one-master-N-mimics pattern.
    #
    # NOTE: master_stiffness / master_damping ALSO flow into Layer 2
    # (articulation_view_runtime) for the master DOF — see
    # ``_init_articulation`` line ~1309.  Both layers carry the SAME
    # values for the master, because the master is the one DOF where
    # both APIs are meaningful in this topology (followers are
    # constraint-driven, so they get kp=0/kd=0 on both layers).
    #
    # Tuning history (read before changing):
    #   master_stiffness=1e4 / master_damping=10: original "reference G2 MJCF"
    #     gainprm.  Worked for static grasps but coupled badly with the mimic
    #     equality constraint under arm motion — the high PD interacted with
    #     the equality solver and AMPLIFIED follower swing
    #     (follower amp 0.06 rad, drift 0.01 rad at 0.5 rad / 0.5 Hz arm
    #     sweep).  Verified empirically via
    #     ``test_robot_xml_dynamic.py --cross-impact-mode sweep``.
    #
    #   master_stiffness=2e3 / master_damping=200: the sweep-determined
    #     sweet spot.  Drops follower drift 30× (0.01 → 0.0003 rad) and
    #     follower amplitude ~33% (0.06 → 0.04 rad) without compromising
    #     grip force: at 0.025 rad command error the master saturates
    #     against ``actfrcrange=±50 N·m`` (from URDF
    #     ``<limit effort=50>``), delivering the same peak torque as the
    #     prior config — just with less PD-vs-equality feedback at small
    #     errors.
    master_stiffness: 2000.0    # kp on master position actuator — sweet spot from the 2026-06 sweep (see history block above): saturates at 0.025 rad error, holds firm under arm motion, drops follower drift 30× vs the original 1e4
    master_damping: 200.0       # kd ditto — pairs with the 2e3 kp to bleed off post-disturbance ringing without amplifying mimic-equality cross-talk
    master_max_force: 0.0      # actuator forcerange cap.  0 = preserve URDF <limit effort> (recommended)
    master_ctrl_range_from_joint_limit: true   # author ctrlrange from joint range so policy ctrl is clamped to hardware envelope

    # Per-gripper-joint passive physics (applied to master + every follower).
    # x2-style uniform passive tuning (matches the
    # ``usd_drive_api.default_revolute`` and per-sub-class blocks).
    # Gripper had its own tuning historically (armature=0.001,
    # damping=0.05, frictionloss=0.01) lifted from the G2 reference,
    # but the user moved every joint class to the x2 convention
    # (uniform armature=0.03, damping=0, frictionloss=0.3) for a
    # consistent passive baseline across the whole robot.
    #
    # Caveat: gripper followers are equality-constrained to the
    # master.  Removing dof_damping eliminates the viscous brake on
    # constraint cross-talk → if you see follower stick-slip or
    # ringing under arm motion, bump ``dof_damping`` back up here
    # without affecting other joints.
    armature: 0.1
    dof_damping: 0.0
    dof_frictionloss: 0.3

    # Mimic equality constraint solver tuning (mjwarp path only — the PhysX
    # path uses PhysxMimicJointAPI fields below).  Default is MuJoCo's soft
    # form ``[0.02, 1.0]`` / ``[0.9, 0.95, 0.001, 0.5, 2.0]``.  For stiff
    # direct mode set negative values: ``mimic_eq_solref = [-10000, -100]``
    # (= stiffness 1e4 N·m/rad, damping 100 N·m·s/rad on the equality).
    # Going much stiffer than [-50000, -500] explodes at typical 2 ms substep.
    mimic_eq_solref: [-10000, -100]
    mimic_eq_solimp: [0.9, 0.95, 0.001, 0.5, 2.0]

    # PhysX-only PhysxMimicJointAPI fields (ignored by mjwarp).
    mimic_natural_frequency: 0.0  # physxMimicJoint:<axis>:naturalFrequency on mimics (0 = rigid)
    mimic_damping_ratio: 0.0      # physxMimicJoint:<axis>:dampingRatio on mimics (0 = rigid)

# Layer 2 — runtime gains pushed via ArticulationView tensor API.
# (Was named ``articulation:`` historically; renamed to make the API
# and scope explicit.  See top-of-file block comment.)  Applied after
# ``world.reset()``.  Wins over Layer 1 for any path that runs the
# Isaac tensor view (isaac_physx, isaac_newton wrapper).  ALSO read
# by the newton-standalone ``MuJoCoWarpAdapter`` (since the adapter
# rewrite that brought standalone into runtime parity with the
# wrapper) — same per-class values land on both engines for any
# scene whose joint names match the canonical regex set in
# ``common/joint_classification.py``.
articulation_view_runtime:
  default:                    # any DOF that doesn't classify into a sub-class
    # ``art_default`` is the fall-through tuning for joints whose
    # name doesn't match any sub-class regex in
    # ``common/joint_classification.py`` — e.g. an arm joint
    # outside the canonical 1-7 numbering, or a robot family that
    # hasn't been added to the classifier yet.  Body / head /
    # arm_shoulder / arm_mid / arm_wrist all have their own
    # blocks below; they don't fall back here.  Keep this set to
    # something safe-but-stiff so an un-classified DOF still tracks
    # commands instead of going limp.
    kp: 5.0e4
    kd: 5.0e3
    max_effort: 5.0e3
  body:                       # body_joint1..5 — torso / heavy
    # Reference G2 MJCF uses kp=1e5 / kd=1e3 for body joints — the
    # highest stiffness in the robot to keep the torso pose rock-
    # steady under arm reaction torques.
    #
    # IDEAL-SIM tuning (current): max_effort raised to 1e7 (truly
    # unlimited, matching the reference's forcerange=[0,0] semantics
    # and our chassis_drive convention) so the actuator never
    # saturates under any command.  No sim-to-real fidelity claim —
    # this is "what the math says is best when you have a perfect
    # torque source".  For real-robot tuning, restore max_effort
    # to the URDF effort cap and either (a) lower kp to fit the
    # saturation envelope, or (b) add dof_damping=3.0 (G2_t2v2
    # convention) to bleed post-saturation overshoot.
    kp: 1.0e5
    kd: 5.0e3
    max_effort: 1.0e7
  head:                       # head_joint1..3 — neck / light
    # Reference G2 MJCF: kp=1000 / kd=20 — sized for the head's
    # tiny inertia (~0.1 kg·m²) so it doesn't over-actuate.  The
    # auto-tuner suggested kp=45000 in ideal-sim mode (the head's
    # M_eff supports MUCH stiffer kp); the conservative reference
    # value is kept here for sim-to-real parity with the existing
    # tuning.  Bump to 5e4 if you want snappy head tracking and
    # don't care about real-robot replication.
    kp: 1.0e3
    kd: 40.0
    max_effort: 1.0e7
  arm_shoulder:               # arm_*_joint1, joint2 — proximal / heavy
    # Reference G2_t2v2 values: kp=40000, kd=600.  IDEAL-SIM tuning:
    # max_effort=1e7 (unlimited) so the actuator has full PD
    # authority — matches the reference's [0,0] forcerange on
    # position actuators (the [-108,108] on the reference is on the
    # MOTOR actuator, not the POSITION one; ideal-sim leaves both
    # unlimited).  Restore the URDF effort cap (108) and drop kp
    # to ~6000 (Option α) for sim-to-real parity.
    kp: 4.0e4
    kd: 1.2e3
    max_effort: 1.0e7
  arm_mid:                    # arm_*_joint3, 4, 5 — elbow region
    # Reference G2_t2v2: kp=15000, kd=220.  Ideal-sim unlimited cap.
    # Wok-flip stiffness: kp 1.5e4->6.0e4 (x4), kd 600->1200 (x2, keeps the
    # damping ratio so it doesn't ring). The x4 (not x2) is what kills the
    # ~5deg dynamic sideways/yaw of the wok at the toss reversal — bandwidth
    # scales as sqrt(kp), so x2 (1.41x) was imperceptible while x4 halves the
    # tracking lag (measured yaw 5.1->1.7deg). max_effort is already unlimited
    # (1e7), so the lever is kp/kd, not the torque cap.
    kp: 6.0e4
    kd: 1200
    max_effort: 1.0e7
  arm_wrist:                  # arm_*_joint6, joint7 — distal / light
    # Reference G2_t2v2: kp=8000, kd=100.  Ideal-sim unlimited cap.
    # Wok-flip stiffness: kp 8e3->3.2e4 (x4), kd 200->400 (x2). See arm_mid.
    kp: 3.2e4
    kd: 400.0
    max_effort: 1.0e7
  chassis_drive:              # chassis_*wheel*joint2 — free-spin road wheel, VELOCITY-controlled
    # The adapter classifies these as ``JK_CHASSIS_DRIVE`` and forces
    # the Newton mode to ``VELOCITY`` so SolverMuJoCo emits a
    # velocity actuator: ``gainprm=[kd, ...] biasprm=[0, 0, -kd, ...]``,
    # which is the exact form the reference G2 MJCF uses for
    # navigation (``force = kd * ctrl - kd * qvel`` → ctrl is the
    # commanded wheel velocity).
    #
    # ``kp`` is unused under VELOCITY mode (no position term in the
    # emitted biasprm); kept here for shape parity with the other
    # blocks.  ``kd`` is the velocity gain — bumping it stiffens the
    # wheel's response to a velocity setpoint and increases the
    # torque applied for a given velocity error.  Reference uses 10;
    # higher than 100 makes the chassis brittle under contact.
    # ``max_effort`` caps the per-step torque the actuator can
    # apply (mjwarp ``forcerange``).
    kp: 0.0
    kd: 10.0                  # velocity gain (N·m·s/rad) — matches reference gainprm=10
    max_effort: 1.0e7
  chassis_steer:              # chassis_*wheel*joint1 — bounded-limit steering joint, POSITION-controlled
    # kp / kd match the reference G2_t2v2_crsB MJCF exactly
    # (gainprm=1000, biasprm[2]=-20 → kp=1000, kd=20).  Earlier
    # local tuning used kp=1e5 (100× stiffer than the reference),
    # rationalised as "stiffer than body so the rack tracks fast".
    # In practice that level of stiffness produces a brittle steer
    # response — small steer-angle commands fly through the
    # actuator's authority at the slightest disturbance.  The
    # reference's kp=1000 against M_eff ≈ 0.08 kg·m² gives
    # ω_n ≈ 112 rad/s (18 Hz) which is plenty responsive for a
    # mobile base navigation rate (< 5 Hz waypoint update).
    #
    # max_effort raised to 1e7 (effectively unlimited) so the
    # steer rack can deliver whatever torque PD computes — matches
    # the ideal-sim convention on body / head / arm.
    kp: 1.0e3
    kd: 20.0
    max_effort: 1.0e7

# Joint-command behaviour.
command:
  cmd_4ws_timeout_s: 0.1      # zero wheel velocities if no /cmd_4ws within this window

stepping:
  # Decoupled-render scheduler (single-thread adaptive) — always on when a
  # GUI is present. Every physics tick runs PhysX directly (~2 ms) and the
  # SimulationApp.update() call (~17 ms) is dispatched on its own cadence.
  # The render is allowed to overrun a single tick (it has to — RTX frames
  # are wider than a 10 ms tick at 100 Hz). The budget gate only vetoes a
  # render when the loop is ALREADY behind by `render_safety_ms`, to avoid
  # piling a render on top of a stalled tick. Has no effect in headless mode.
  render_target_hz: 30.0      # visual rate target for the adaptive renderer
  render_safety_ms: 2.0       # skip render only when already this many ms past deadline
