robot:
  robot_name: arx_acone
  robot_prefix: arx
  robot_source:
    arm: acone
    body: t2
    gripper: ""
    robot_model: arx
    package: genie_sim_robot_model
    pin_base_to_world: true
    urdf: {}
  init_base_pose:
    x: 0.0
    y: 0.0
    z: 0.05
    theta: 0.0
  init_joint_pos:
    arm_l_joint1: -45
    arm_l_joint2: 0
    arm_l_joint3: 0
    arm_r_joint1: -45
    arm_r_joint2: 0
    arm_r_joint3: 0

# Newton GL viewer / OVRtx FreeCam initial pose.  Z-up world frame; lookat
# sets the orbit pivot.  Acone is a static tabletop arm (~50 cm reach) at
# origin -- frame from front-right at arm height.
viewer_camera:
  pos:    [1.0, -1.0, 0.7]
  lookat: [0.3,  0.0, 0.4]

cameras:
- prim_path: base_link/head_camera
  frame_id: base_link
  topic:
    rgb: /genie_sim/head_camera_rgb
    depth: /genie_sim/head_camera_depth
  sensor:
    width: 640
    height: 480
    freq: 10.0
    min_range: 0.01
    max_range: 10000
  intrinsic:
    cx: 320.0
    cy: 240.0
    fx: 461.67999
    fy: 617.12
    k1: -0.015
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
  extrinsic:
    xyz: [0.1, 0.0, 0.6]
    wxyz: [0.68757, 0.16507, -0.16507, -0.68757]

- prim_path: arm_l_end_link/hand_left_camera
  frame_id: arm_l_end_link
  topic:
    rgb: /genie_sim/hand_left_camera_rgb
    depth: /genie_sim/hand_left_camera_depth
  sensor:
    width: 640
    height: 480
    freq: 10.0
    min_range: 0.01
    max_range: 10000
  intrinsic:
    cx: 320.0
    cy: 240.0
    fx: 461.67999
    fy: 617.12
    k1: -0.015
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
  extrinsic:
    xyz: [0.07289, 0.0, 0.07162]
    wxyz: [0.63281, 0.31551, 0.31551, -0.63281]

- prim_path: arm_r_end_link/hand_right_camera
  frame_id: arm_r_end_link
  topic:
    rgb: /genie_sim/hand_right_camera_rgb
    depth: /genie_sim/hand_right_camera_depth
  sensor:
    width: 640
    height: 480
    freq: 10.0
    min_range: 0.01
    max_range: 10000
  intrinsic:
    cx: 320.0
    cy: 240.0
    fx: 461.67999
    fy: 617.12
    k1: -0.015
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    xyz: [0.07289, 0.0, 0.07162]
    wxyz: [0.63281, 0.31551, 0.31551, -0.63281]
lidars: []
scene:
