robot:
  robot_name: agilex_aloha
  robot_prefix: aloha
  robot_source:
    arm: aloha
    body: ""
    gripper: ""
    robot_model: agilex
    package: genie_sim_robot_model
    pin_base_to_world: true     # stationary dual-arm — keep URDF root_joint weld
    convert_joints_to_fixed: []
    urdf: {}
  init_base_pose:
    x: 0.0
    y: 0.0
    z: 0.15
    theta: 0.0
  init_joint_pos:
    arm_fl_joint1: 0
    arm_fl_joint2: 90
    arm_fl_joint3: -90
    arm_fl_joint4: 0
    arm_fl_joint5: 0
    arm_fl_joint6: 0
    arm_fr_joint1: 0
    arm_fr_joint2: 90
    arm_fr_joint3: -90
    arm_fr_joint4: 0
    arm_fr_joint5: 0
    arm_fr_joint6: 0
    arm_bl_joint1: 0
    arm_bl_joint2: 90
    arm_bl_joint3: -90
    arm_bl_joint4: 0
    arm_bl_joint5: 0
    arm_bl_joint6: 0
    arm_br_joint1: 0
    arm_br_joint2: 90
    arm_br_joint3: -90
    arm_br_joint4: 0
    arm_br_joint5: 0
    arm_br_joint6: 0

# Newton GL viewer / OVRtx FreeCam initial pose.  Z-up world frame; lookat
# sets the orbit pivot.  Aloha is a low mobile dual-arm platform (~80 cm
# tall) -- frame slightly above and right of origin, aimed at torso height.
viewer_camera:
  pos:    [1.4, -1.4, 1.0]
  lookat: [0.0,  0.0, 0.6]

cameras:
- prim_path: base_link/Head_Camera
  frame_id: base_link
  topic:
    rgb: /genie_sim/head_camera_rgb
    depth: /genie_sim/head_camera_depth
  sensor:
    width: 640
    height: 400
    freq: 10.0
    min_range: 0.01
    max_range: 10000
  intrinsic:
    cx: 318.7979431152
    cy: 202.4943847656
    fx: 305.6425170898
    fy: 305.6007080078
    k1: 0
    k2: 0
    p1: 0
    p2: 0
    k3: 0
  extrinsic:
    xyz: [0.0, 0.0, 0.0]
    wxyz: [1.0, 0.0, 0.0, 0.0]
lidars: []
scene:
