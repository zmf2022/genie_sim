robot_model: universal_robots
arm: ur5
description_package: genie_sim_robot_model

xacro_args:
  gripper: robotiq_85

grippers:
  - name: ur5_robotiq_85
    gripper: robotiq_85
  - name: ur5_robotiq_140
    gripper: robotiq_140
  - name: ur5_no_gripper
    gripper: no_gripper

joint_groups:
  arm:
    - arm_joint1
    - arm_joint2
    - arm_joint3
    - arm_joint4
    - arm_joint5
    - arm_joint6
  gripper:
    - gripper_active_joint
    - gripper_active_inner_joint
    - gripper_active_tip_joint
    - gripper_passive_outer_joint
    - gripper_passive_inner_joint
    - gripper_passive_tip_joint
