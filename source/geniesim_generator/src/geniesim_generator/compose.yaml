# Genie Sim — generator MCP asset-retrieval stack.
#
# Pick ONE embedding profile (they both bind :8765, run only one):
#   docker compose --profile text up --build   # Qwen embedding API (no GPU; needs API key)
#   docker compose --profile vl   up --build   # Qwen3-VL embedding (local GPU + NVIDIA Container Toolkit)
#
# The geniesim_assets package is now `pip install`-ed on the host. The image
# does NOT bundle it (the asset library is multi-GB) — instead, we mount the
# host's already-installed copy into the container at runtime. Before bringing
# the stack up, point GENIESIM_ASSETS_DIR at the package directory:
#
#   export GENIESIM_ASSETS_DIR=$(python -c \
#       "import geniesim_assets, os; print(os.path.dirname(geniesim_assets.__file__))")
#   docker compose --profile text up --build
#
# entrypoint.sh adds /opt to PYTHONPATH so the mounted copy at
# /opt/geniesim_assets is importable from inside the container.
#
# Layout note: this file lives at source/geniesim_generator/src/geniesim_generator/.
#   .      → src/geniesim_generator      (package; server/ + config/ live here)
#   ../..  → source/geniesim_generator   (distribution; has pyproject.toml)
# entrypoint.sh editable-installs the generator distribution from its mount
# at startup, so live source edits take effect without a rebuild.

services:
  mcp-server_vl:
    profiles:
      - vl
    build:
      context: ./server
      dockerfile: mcp_vl_embedding/dockerfile
    container_name: assets-retrieval-agent_vl
    ports:
      - "8765:8765"
    volumes:
      - ../..:/opt/geniesim_generator                      # distribution (pyproject + src/)
      - ${GENIESIM_ASSETS_DIR:?set GENIESIM_ASSETS_DIR to the host path of the pip-installed geniesim_assets package (see header)}:/opt/geniesim_assets:ro
      - ./server_chromadb_vl:/tmp/chromadb_cache_vl:rw
    command:
      [
        "mcpo",
        "--config",
        "/opt/geniesim_generator/src/geniesim_generator/server/mcp_config.json",
        "--port",
        "8765",
      ]
    working_dir: /opt/geniesim_generator
    environment:
      - EMBEDDING_MODE=vl
      - VL_EMBEDDING_MODEL=Qwen3-VL-Embedding-2B
      - PERMANENT_MODEL_IN_GPU=False
      - USE_RERANKER=False
      - BATCH_SIZE=10
    restart: unless-stopped
    deploy:
      resources:
          reservations:
              devices:
                  - driver: "nvidia"
                    count: "all"
                    capabilities: ["gpu"]
  mcp-server_text:
    profiles:
      - text
    build:
      context: ./server
      dockerfile: mcp_text_embedding/dockerfile
    container_name: assets-retrieval-agent_text
    ports:
      - "8765:8765"
    environment:
      - EMBEDDING_MODE=text
    volumes:
      - ../..:/opt/geniesim_generator                      # distribution (pyproject + src/)
      - ${GENIESIM_ASSETS_DIR:?set GENIESIM_ASSETS_DIR to the host path of the pip-installed geniesim_assets package (see header)}:/opt/geniesim_assets:ro
      - ./server_chromadb:/tmp/chromadb_cache:rw
    command:
      [
        "mcpo",
        "--config",
        "/opt/geniesim_generator/src/geniesim_generator/server/mcp_config.json",
        "--port",
        "8765",
      ]
    working_dir: /opt/geniesim_generator
    restart: unless-stopped
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    network_mode: host
    volumes:
      - ../..:/opt/geniesim_generator
      - ./server_open-webui:/app/backend/data
    environment:
      - WEBUI_AUTH=False
      - HF_ENDPOINT=http://hf-mirror.com
    restart: always

volumes:
  open-webui:
